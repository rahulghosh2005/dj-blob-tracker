<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ Blob Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loader">
    <div class="loader-inner">
      <div class="pulse-ring"></div>
      <div class="pulse-ring delay1"></div>
      <div class="pulse-ring delay2"></div>
      <p id="loader-text">Loading Models...</p>
    </div>
  </div>

  <video id="webcam" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>

  <!-- Floating mode pill top-right -->
  <div id="mode-pill"></div>

  <div id="hud">
    <div id="fps-counter">-- fps</div>
    <div id="blob-count">0 blobs</div>
    <div id="gesture-display"></div>
  </div>

  <div id="controls">
    <button id="toggle-controls" title="Toggle controls [H]">&#9881;</button>
    <div id="controls-panel">

      <div class="control-group">
        <label>Camera</label>
        <select id="camera-select"><option>Loading...</option></select>
      </div>

      <div class="control-group">
        <label>Color</label>
        <div class="btn-row">
          <button class="theme-btn active" data-theme="purple">Purple</button>
          <button class="theme-btn" data-theme="white">White</button>
          <button class="theme-btn" data-theme="green">Green</button>
          <button class="theme-btn" data-theme="fire">Fire</button>
        </div>
      </div>

      <div class="control-group">
        <label>FX</label>
        <div class="btn-row">
          <button class="fx-btn active" data-fx="particles" title="Fingertip particles">PTCL</button>
          <button class="fx-btn active" data-fx="spirit"    title="Spirit ghost map">SPRT</button>
          <button class="fx-btn active" data-fx="crt"       title="CRT scanlines">CRT</button>
          <button class="fx-btn active" data-fx="wave"      title="Edge waveform">WAVE</button>
        </div>
      </div>

      <div class="control-group">
        <label>Show Camera Feed</label>
        <label class="toggle">
          <input type="checkbox" id="show-video" checked />
          <span class="slider"></span>
        </label>
      </div>

      <div class="control-group">
        <label>Motion Sensitivity</label>
        <input type="range" id="glow-slider" min="5" max="60" value="22" />
      </div>

      <div class="control-group">
        <label>BG Learn Speed</label>
        <input type="range" id="trail-slider" min="10" max="150" value="40" />
      </div>

      <div class="control-group">
        <label>ML Confidence</label>
        <input type="range" id="confidence-slider" min="10" max="90" value="35" />
      </div>

      <div class="control-group truth-row">
        <label class="truth-label">TRUTH MODE</label>
        <label class="toggle">
          <input type="checkbox" id="truth-toggle" />
          <span class="slider truth-slider"></span>
        </label>
        <span class="truth-hint">1·2·3·4·FIST=BTR</span>
      </div>

      <div class="control-group">
        <span class="keys-label">T  F  V  H  R</span>
      </div>

      <div class="control-group">
        <button id="fullscreen-btn">&#x26F6; Fullscreen [F]</button>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
