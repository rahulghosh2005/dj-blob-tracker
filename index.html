<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ Blob Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loader">
    <div class="loader-inner">
      <div class="pulse-ring"></div>
      <div class="pulse-ring delay1"></div>
      <div class="pulse-ring delay2"></div>
      <p id="loader-text">Loading ML Model...</p>
    </div>
  </div>

  <video id="webcam" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="hud">
    <div id="fps-counter">-- fps</div>
    <div id="blob-count">0 blobs</div>
  </div>

  <div id="controls">
    <button id="toggle-controls" title="Toggle controls">&#9881;</button>
    <div id="controls-panel">
      <div class="control-group">
        <label>Camera</label>
        <select id="camera-select"><option>Loading...</option></select>
      </div>
      <div class="control-group">
        <label>Theme</label>
        <div class="btn-row">
          <button class="theme-btn active" data-theme="neon">Neon</button>
          <button class="theme-btn" data-theme="fire">Fire</button>
          <button class="theme-btn" data-theme="ice">Ice</button>
          <button class="theme-btn" data-theme="void">Void</button>
        </div>
      </div>
      <div class="control-group">
        <label>Show Camera Feed</label>
        <label class="toggle">
          <input type="checkbox" id="show-video" checked />
          <span class="slider"></span>
        </label>
      </div>
      <div class="control-group">
        <label>Blob Glow</label>
        <input type="range" id="glow-slider" min="0" max="80" value="30" />
      </div>
      <div class="control-group">
        <label>Trail Length</label>
        <input type="range" id="trail-slider" min="0" max="40" value="20" />
      </div>
      <div class="control-group">
        <label>Confidence</label>
        <input type="range" id="confidence-slider" min="10" max="90" value="40" />
      </div>
      <div class="control-group">
        <button id="fullscreen-btn">&#x26F6; Fullscreen</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
